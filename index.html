<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="theme-color" content="#000000">
	<title>Karl Querel • Software Engineer</title>
	<meta name="robots" content="max-snippet:160, max-image-preview:large, max-video-preview:-1">

	<meta name="description" content="Former finance guy, now full-stack dev. Turned in my spreadsheets for code scripts." />
	<link rel="canonical" href="https://karlquerel.com/">

	<!-- Social sharing — link-preview card (LinkedIn / Slack / Discord / iMessage) -->
	<meta property="og:type" content="website">
	<meta property="og:site_name" content="Karl Querel">
	<meta property="og:url" content="https://karlquerel.com/">
	<meta property="og:title" content="Karl Querel • Software Engineer">
	<meta property="og:description" content="Former finance guy, now full-stack dev. Turned in my spreadsheets for code scripts.">
	<meta property="og:image" content="https://karlquerel.com/assets/img/og-card.png">
	<meta property="og:image:width" content="1200">
	<meta property="og:image:height" content="630">
	<meta property="og:image:alt" content="Pixel-art card — Karl Querel, Software Engineer">
	<meta name="twitter:card" content="summary_large_image">
	<meta name="twitter:title" content="Karl Querel • Software Engineer">
	<meta name="twitter:description" content="Former finance guy, now full-stack dev. Turned in my spreadsheets for code scripts.">
	<meta name="twitter:image" content="https://karlquerel.com/assets/img/og-card.png">

	<!-- Structured data — ties this domain to the GitHub / LinkedIn profiles in search results -->
	<script type="application/ld+json">
		{
			"@context": "https://schema.org",
			"@type": "Person",
			"name": "Karl Querel",
			"jobTitle": "Software Engineer",
			"url": "https://karlquerel.com/",
			"sameAs": [
				"https://github.com/KarlQuerel",
				"https://www.linkedin.com/in/karlquerel"
			]
		}
	</script>

	<!-- *** IMPORTS *** -->

	<!-- Icon — pixel-art "K" (SVG primary; png/ico fallbacks) -->
	<link rel="icon" href="/favicon.svg" type="image/svg+xml">
	<link rel="icon" href="/favicon.png" type="image/png" sizes="192x192">
	<link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
	<!-- iOS ignores the favicons above for home-screen tiles -->
	<link rel="apple-touch-icon" href="/apple-touch-icon.png">
	<link rel="manifest" href="/site.webmanifest">

	<!-- Fonts — self-hosted latin subsets (see src/styles/_fonts.scss), preloaded off the render-blocking path -->
	<link rel="preload" href="/assets/fonts/press-start-2p-latin.woff2" as="font" type="font/woff2" crossorigin>
	<link rel="preload" href="/assets/fonts/vt323-latin.woff2" as="font" type="font/woff2" crossorigin>
</head>

<body>
	<!-- Vue App -->
	<div id="app"></div>

	<!-- JavaScript script -->
	<script type="module" src="/src/main.js"></script>
</body>
</html>
